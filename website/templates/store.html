{% extends "layout.html" %}
{% block body %}
<h1>Store</h1>
<!-- Flex container to put divs side by side -->
<div class="flex-container">
    <!-- Card for the filters to go into -->
    <div class="filters-card">
        <h2>Filters</h2>
        <h3>Category</h3>
            <input type="checkbox" id="category1" name="category1" value="hygiene">
            <label for="category1">Hygiene</label><br>
            <input type="checkbox" id="category2" name="category2" value="furniture">
            <label for="category1">Furniture</label><br>
            <input type="checkbox" id="category3" name="category3" value="electronics">
            <label for="category1">Electronics</label><br>
        <h3>Price</h3>
            <label for="minimum">Minimum</label>
            <input type="number" id="minimum" name="minimum" placeholder="$">
            <label for="number">Maximum</label>
            <input type="number" id="maximum" name="maximum" placeholder="$">
        <button type="button">Submit</button>
    </div>
    <!-- Grid for the products to go in -->
    <div class="product-grid">
    <!-- Loop to display every product and its image -->
    {% for product in database['products'] %}
        <!-- Card for the products to go into -->
        <div class="product-card">
            <img src="{{ product[4] }}" alt="{{ product[2] }}">
            <p>{{ product[2] }} <br> ${{ "%.2f" | format(product[3] | float) }}</p>
            <button type="button">Add to Cart</button><br>
            <button type="button">Wishlist</button>
        </div>
    {% endfor %}
    </div>
</div>
{% endblock %}
